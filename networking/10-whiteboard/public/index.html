<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Demo 10 — Shared Whiteboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div class="header">
            <h2>Demo 10: Shared Whiteboard</h2>
            <div class="header-right">
                <div class="size-controls">
                    Brush: <input type="range" min="1" max="20" v-model.number="brushSize">
                    {{ brushSize }}px
                </div>
                <div class="color-dot" :style="{ background: myColor }"></div>
                <span class="online">{{ onlineCount }} online</span>
                <button class="clear-btn" @click="clearCanvas()">Clear All</button>
            </div>
        </div>

        <canvas ref="canvas" @mousedown="startDraw($event)" @mousemove="draw($event)" @mouseup="stopDraw()"
            @mouseleave="stopDraw()" @touchstart.prevent="startDraw($event)" @touchmove.prevent="draw($event)"
            @touchend.prevent="stopDraw()" @touchcancel.prevent="stopDraw()"></canvas>

        <div class="hint">Draw with your mouse or finger — each user gets a unique color</div>
    </div>

    <script src="app.js"></script>
</body>

</html>
